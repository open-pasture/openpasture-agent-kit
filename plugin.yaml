name: openpasture
version: 0.1.0-alpha
description: Hermes connector manifest for the openPasture agent kit.
provides_tools:
  - save_data_pipeline
  - run_data_pipeline
  - list_data_pipelines
  - setup_initial_farm
  - register_farm
  - add_paddock
  - get_farm_state
  - set_herd_position
  - record_observation
  - get_paddock_state
  - movement_decision
  - approve_plan
  - store_lesson
  - update_lesson
  - find_similar_lessons
  - queue_source
  - process_queue
  - search_knowledge
  - list_knowledge_sources
  - create_ingestion_batch
  - get_ingestion_batch_status
  - claim_ingestion_batch_item
  - record_ingestion_batch_result
  - generate_morning_brief
provides_hooks:
  - on_session_start
  - pre_llm_call
requires_env:
  - OPENPASTURE_STORE
