name: Alpha Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  automated-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev --python 3.11

      - name: Run automated alpha validation
        run: uv run --python 3.11 openpasture-alpha-validate automated
